<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mas Que Foto - Estudio Fotográfico</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loader { border-top-color: #000; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom Toggle Switch */
        .dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .dot { transform: translateX(100%); background-color: #000; }
        input:checked ~ .block { background-color: #e5e7eb; }
    </style>
</head>
<body class="bg-white text-black selection:bg-black selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN ---
        // Pega aquí tu URL de Google Apps Script
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby0dcuoeOhip8Wm2gJPKf-iGRBQqjgFMjnorlds99joBl3KTgD85eBHEm3ai-kxK84e/exec';

        const App = () => {
            const [filesData, setFilesData] = useState([]); // Array de objetos { file, pages, isColor }
            const [isUploading, setIsUploading] = useState(false);
            const [uploadStatus, setUploadStatus] = useState(null);
            const [formData, setFormData] = useState({
                nombre: '',
                telefono: '',
                mensaje: ''
            });

            useEffect(() => {
                lucide.createIcons();
            }, [uploadStatus, filesData, isUploading]);

            // Función para contar páginas de PDF desde el cliente
            const countPdfPages = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = function() {
                        const content = reader.result;
                        const matches = content.match(/\/Count\s+(\d+)/);
                        resolve(matches ? parseInt(matches[1]) : 1);
                    };
                    reader.readAsBinaryString(file);
                });
            };

            const handleFileUpload = async (e) => {
                const selectedFiles = Array.from(e.target.files);
                const newFilesData = [];

                for (const file of selectedFiles) {
                    let pages = 1;
                    if (file.type === 'application/pdf') {
                        pages = await countPdfPages(file);
                    }
                    newFilesData.push({
                        file: file,
                        pages: pages,
                        isColor: true, // Por defecto Color
                        id: Math.random().toString(36).substr(2, 9)
                    });
                }
                
                setFilesData([...filesData, ...newFilesData]);
                setUploadStatus(null);
            };

            const toggleColor = (id) => {
                setFilesData(prev => prev.map(item => 
                    item.id === id ? { ...item, isColor: !item.isColor } : item
                ));
            };

            const removeFile = (id) => {
                setFilesData(prev => prev.filter(item => item.id !== id));
            };

            // Cálculo del presupuesto basado en la selección actual
            const budget = useMemo(() => {
                let photoCount = 0;
                let pdfColorPages = 0;
                let pdfBNPages = 0;

                filesData.forEach(item => {
                    if (item.file.type.includes('image')) {
                        photoCount++;
                    } else if (item.file.type === 'application/pdf') {
                        if (item.isColor) pdfColorPages += item.pages;
                        else pdfBNPages += item.pages;
                    }
                });

                // Precios Fotos: 1=1€ | 2-99=0.50€ | 100+=0.30€
                let photoPrice = 1.00;
                if (photoCount >= 2 && photoCount <= 99) photoPrice = 0.50;
                if (photoCount >= 100) photoPrice = 0.30;

                const total = (photoCount * photoPrice) + (pdfColorPages * 0.75) + (pdfBNPages * 0.30);
                
                return { total, photoCount, pdfColorPages, pdfBNPages, photoPrice };
            }, [filesData]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (filesData.length === 0 || !formData.nombre || !formData.telefono) return;
                
                setIsUploading(true);

                try {
                    const filePromises = filesData.map(item => {
                        return new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve({
                                base64: reader.result.split(',')[1],
                                name: item.file.name,
                                type: item.file.type,
                                isColor: item.isColor, // Enviamos preferencia al script
                                pages: item.pages
                            });
                            reader.readAsDataURL(item.file);
                        });
                    });

                    const encodedFiles = await Promise.all(filePromises);

                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            nombre: formData.nombre,
                            telefono: formData.telefono,
                            mensaje: formData.mensaje,
                            archivos: encodedFiles
                        })
                    });

                    setIsUploading(false);
                    setUploadStatus('success');
                    setFilesData([]);
                    setFormData({ nombre: '', telefono: '', mensaje: '' });
                } catch (error) {
                    setIsUploading(false);
                    alert("Error en el envío. Revisa la consola o la URL del script.");
                }
            };

            return (
                <div className="min-h-screen bg-white">
                    <nav className="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <i data-lucide="camera" className="w-7 h-7"></i>
                                <span className="text-xl font-bold tracking-tighter uppercase">Mas Que Foto</span>
                            </div>
                            <div className="hidden md:flex space-x-10 text-sm font-medium uppercase tracking-widest">
                                <a href="#" className="hover:opacity-50 transition-opacity">Estudio</a>
                                <a href="#" className="font-bold underline">Enviar Pedido</a>
                                <a href="#" className="hover:opacity-50 transition-opacity">Tienda</a>
                            </div>
                        </div>
                    </nav>

                    <section className="pt-32 pb-24 px-6">
                        <div className="max-w-4xl mx-auto">
                            <div className="text-center mb-12">
                                <h2 className="text-5xl font-black uppercase tracking-tighter mb-4">Tu Pedido Online</h2>
                                <p className="text-gray-500 max-w-lg mx-auto italic">Sube tus fotos 10x15 o documentos PDF y selecciona el acabado deseado.</p>
                            </div>

                            {!uploadStatus ? (
                                <form onSubmit={handleSubmit} className="grid md:grid-cols-5 gap-8">
                                    {/* Columna Izquierda: Datos y Archivos */}
                                    <div className="md:col-span-3 space-y-6">
                                        <div className="bg-gray-50 p-6 rounded-3xl space-y-4">
                                            <h3 className="text-xs uppercase font-black tracking-widest text-gray-400 mb-2">1. Tus Datos</h3>
                                            <div className="grid grid-cols-2 gap-4">
                                                <input 
                                                    type="text" required placeholder="Nombre"
                                                    className="w-full px-5 py-4 rounded-2xl border-none bg-white shadow-sm outline-none focus:ring-2 focus:ring-black transition-all"
                                                    onChange={e => setFormData({...formData, nombre: e.target.value})}
                                                    value={formData.nombre}
                                                />
                                                <input 
                                                    type="tel" required placeholder="Teléfono"
                                                    className="w-full px-5 py-4 rounded-2xl border-none bg-white shadow-sm outline-none focus:ring-2 focus:ring-black transition-all"
                                                    onChange={e => setFormData({...formData, telefono: e.target.value})}
                                                    value={formData.telefono}
                                                />
                                            </div>
                                            <textarea 
                                                placeholder="Instrucciones adicionales (ej. brillo/mate, copias...)"
                                                className="w-full px-5 py-4 rounded-2xl border-none bg-white shadow-sm outline-none focus:ring-2 focus:ring-black transition-all h-24"
                                                onChange={e => setFormData({...formData, mensaje: e.target.value})}
                                                value={formData.mensaje}
                                            ></textarea>
                                        </div>

                                        <div className="bg-gray-50 p-6 rounded-3xl">
                                            <h3 className="text-xs uppercase font-black tracking-widest text-gray-400 mb-4">2. Archivos Seleccionados</h3>
                                            
                                            <div className="space-y-3">
                                                {filesData.map((item) => (
                                                    <div key={item.id} className="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-gray-100 animate-in fade-in slide-in-from-left-2">
                                                        <div className="flex items-center space-x-4 overflow-hidden">
                                                            <div className={`p-3 rounded-xl ${item.file.type === 'application/pdf' ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-blue-500'}`}>
                                                                <i data-lucide={item.file.type === 'application/pdf' ? 'file-text' : 'image'} className="w-5 h-5"></i>
                                                            </div>
                                                            <div className="truncate">
                                                                <p className="text-sm font-bold truncate max-w-[150px]">{item.file.name}</p>
                                                                <p className="text-[10px] uppercase text-gray-400 font-bold">
                                                                    {item.file.type === 'application/pdf' ? `${item.pages} páginas` : 'Foto 10x15'}
                                                                </p>
                                                            </div>
                                                        </div>

                                                        <div className="flex items-center space-x-6">
                                                            {item.file.type === 'application/pdf' && (
                                                                <div className="flex items-center space-x-2">
                                                                    <span className={`text-[10px] font-black uppercase ${!item.isColor ? 'text-black' : 'text-gray-300'}`}>B/N</span>
                                                                    <label className="flex items-center cursor-pointer">
                                                                        <div className="relative">
                                                                            <input type="checkbox" className="sr-only" checked={item.isColor} onChange={() => toggleColor(item.id)} />
                                                                            <div className="block bg-gray-200 w-10 h-6 rounded-full"></div>
                                                                            <div className="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition"></div>
                                                                        </div>
                                                                    </label>
                                                                    <span className={`text-[10px] font-black uppercase ${item.isColor ? 'text-black' : 'text-gray-300'}`}>Color</span>
                                                                </div>
                                                            )}
                                                            <button type="button" onClick={() => removeFile(item.id)} className="text-gray-300 hover:text-red-500 transition-colors">
                                                                <i data-lucide="x" className="w-5 h-5"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}

                                                <label className="border-2 border-dashed border-gray-200 rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer hover:bg-gray-100 transition-all text-gray-400 group">
                                                    <input type="file" multiple className="hidden" onChange={handleFileUpload} accept="image/*,application/pdf" />
                                                    <i data-lucide="plus" className="w-8 h-8 mb-2 group-hover:scale-110 transition-transform text-gray-300"></i>
                                                    <span className="text-[10px] font-black uppercase tracking-widest">Añadir más archivos</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Columna Derecha: Presupuesto y Envío */}
                                    <div className="md:col-span-2">
                                        <div className="bg-black text-white p-8 rounded-[2.5rem] sticky top-28 shadow-2xl shadow-black/20">
                                            <h3 className="text-xs uppercase font-black tracking-[0.2em] text-white/40 mb-8 text-center">Resumen de Pedido</h3>
                                            
                                            <div className="space-y-5 mb-10">
                                                {budget.photoCount > 0 && (
                                                    <div className="flex justify-between items-center text-sm">
                                                        <span className="opacity-60">Fotos 10x15 ({budget.photoCount} ud.)</span>
                                                        <span className="font-bold">{(budget.photoCount * budget.photoPrice).toFixed(2)}€</span>
                                                    </div>
                                                )}
                                                {budget.pdfColorPages > 0 && (
                                                    <div className="flex justify-between items-center text-sm">
                                                        <span className="opacity-60">PDF Color ({budget.pdfColorPages} págs)</span>
                                                        <span className="font-bold">{(budget.pdfColorPages * 0.75).toFixed(2)}€</span>
                                                    </div>
                                                )}
                                                {budget.pdfBNPages > 0 && (
                                                    <div className="flex justify-between items-center text-sm">
                                                        <span className="opacity-60">PDF B/N ({budget.pdfBNPages} págs)</span>
                                                        <span className="font-bold">{(budget.pdfBNPages * 0.30).toFixed(2)}€</span>
                                                    </div>
                                                )}
                                                
                                                <div className="border-t border-white/10 pt-5 flex justify-between items-end">
                                                    <span className="text-[10px] font-black uppercase tracking-widest">Total a pagar</span>
                                                    <span className="text-5xl font-black tracking-tighter">{budget.total.toFixed(2)}€</span>
                                                </div>
                                            </div>

                                            <button 
                                                type="submit"
                                                disabled={isUploading || filesData.length === 0}
                                                className="w-full bg-white text-black py-5 rounded-2xl font-black uppercase tracking-[0.2em] hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-20 flex items-center justify-center space-x-3"
                                            >
                                                {isUploading ? (
                                                    <div className="loader rounded-full border-2 border-t-2 border-black h-5 w-5"></div>
                                                ) : (
                                                    <span>Enviar Pedido</span>
                                                )}
                                            </button>
                                            
                                            <p className="text-[9px] text-center mt-6 text-white/30 uppercase leading-relaxed font-bold">
                                                El pago se realizará en el estudio al recoger el pedido.
                                            </p>
                                        </div>
                                    </div>
                                </form>
                            ) : (
                                <div className="max-w-md mx-auto py-20 text-center animate-in zoom-in fade-in duration-700">
                                    <div className="w-24 h-24 bg-black rounded-full flex items-center justify-center mx-auto mb-8">
                                        <i data-lucide="check" className="w-12 h-12 text-white"></i>
                                    </div>
                                    <h3 className="text-4xl font-black uppercase tracking-tighter mb-4 text-black">¡Pedido Enviado!</h3>
                                    <p className="text-gray-500 mb-10 leading-relaxed font-medium">Hemos recibido tus archivos. Te avisaremos cuando estén listos para recoger.</p>
                                    <button 
                                        onClick={() => setUploadStatus(null)} 
                                        className="inline-block px-10 py-4 bg-gray-100 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-black hover:text-white transition-all"
                                    >
                                        Hacer otro pedido
                                    </button>
                                </div>
                            )}
                        </div>
                    </section>

                    <footer className="py-12 px-6 border-t border-gray-100 text-center">
                        <p className="text-[10px] font-black uppercase tracking-[0.3em] text-gray-300">© 2024 Mas Que Foto Estudio</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
